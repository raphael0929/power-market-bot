name: 01 · 매일 콘텐츠 초안 생성

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: '직접 주제 입력 (비워두면 AI가 자동 선정)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements_agent.txt
      - name: Generate content draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_TOPIC: ${{ github.event.inputs.topic }}
        run: python daily_agent.py generate
      - name: Commit draft
        run: |
          git config user.name "daily-content-bot"
          git config user.email "bot@github-actions"
          git add drafts/
          git diff --cached --quiet || git commit -m "draft: $(date -u +%Y-%m-%d)"
          git push origin ${GITHUB_REF_NAME}
